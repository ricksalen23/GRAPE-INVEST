<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Simples</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #fff;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: #111;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.saldo {
  font-size: 28px;
  font-weight: 800;
}

.status {
  font-size: 14px;
  margin-top: 8px;
}

.limite {
  font-size: 18px;
  margin-top: 10px;
}

.btn {
  width: 100%;
  height: 60px;
  border-radius: 16px;
  border: none;
  font-size: 18px;
  font-weight: 700;
  background: #7C3AED;
  color: white;
  margin-top: 20px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
}

input {
  width: 100%;
  height: 50px;
  border-radius: 12px;
  border: none;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
}

.feedback {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="saldo" id="saldo">R$ 2.400</div>
    <div class="status" id="status">🟢 Seguro</div>
    <div class="limite" id="limite">Hoje você pode gastar até R$ 80</div>
  </div>

  <button class="btn" onclick="abrirModal()">+ Adicionar gasto</button>

  <div class="feedback" id="feedback"></div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Adicionar gasto</h3>
    <input type="number" id="valor" placeholder="Valor (R$)">
    <button class="btn" onclick="salvarGasto()">Salvar</button>
  </div>
</div>

<script>
let saldo = 2400;
let limiteDia = 80;

function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

function salvarGasto() {
  const valor = parseFloat(document.getElementById("valor").value);
  if (!valor) return;

  saldo -= valor;
  limiteDia -= valor;

  document.getElementById("saldo").innerText = "R$ " + saldo.toFixed(2);

  let status = "🟢 Seguro";
  let feedback = "✔️ Você ainda está no controle";

  if (limiteDia < 0) {
    status = "🔴 Perigo";
    feedback = "🚨 Você passou do limite hoje";
  } else if (limiteDia < 30) {
    status = "🟡 Atenção";
    feedback = "⚠️ Cuidado com seus gastos hoje";
  }

  document.getElementById("status").innerText = status;
  document.getElementById("feedback").innerText = feedback;

  fecharModal();
}
</script>

</body>
</html
